<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FINCH WORLD | Jeff 7.0</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f;
  color: #7eb8f7;
  font-family: 'Courier New', monospace;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#canvas-container {
  position: relative;
  flex: 1;
  min-height: 0;
}
canvas {
  display: block;
  width: 100%;
  height: 100%;
}
#speech-bubble {
  position: absolute;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(10,20,40,0.92);
  border: 1px solid #3a7bd5;
  border-radius: 12px;
  padding: 12px 20px;
  max-width: 680px;
  width: 90%;
  font-size: 0.85rem;
  color: #a8d4ff;
  line-height: 1.5;
  min-height: 44px;
  text-align: center;
  box-shadow: 0 0 20px rgba(58,123,213,0.3);
  z-index: 10;
}
#speech-bubble::after {
  content: '';
  position: absolute;
  bottom: -10px;
  left: 50%;
  transform: translateX(-50%);
  border: 10px solid transparent;
  border-top-color: #3a7bd5;
  border-bottom: none;
}
#main-layout {
  display: flex;
  height: 220px;
  border-top: 1px solid #1a2a4a;
  background: #060810;
}
#chat-history {
  flex: 1;
  overflow-y: auto;
  padding: 10px 14px;
  font-size: 0.78rem;
  border-right: 1px solid #1a2a4a;
}
#chat-history::-webkit-scrollbar { width: 4px; }
#chat-history::-webkit-scrollbar-track { background: #060810; }
#chat-history::-webkit-scrollbar-thumb { background: #2a4a8a; border-radius: 2px; }
.msg { margin-bottom: 8px; line-height: 1.4; }
.msg.user { color: #a8d4ff; }
.msg.user::before { content: '[ YOU ] '; color: #4a8adf; font-weight: bold; }
.msg.jeff { color: #7eb8f7; }
.msg.jeff::before { content: '[ JEFF ] '; color: #3ab8ff; font-weight: bold; }
.msg.system { color: #456; font-style: italic; }
#input-area {
  width: 280px;
  display: flex;
  flex-direction: column;
  padding: 10px;
  gap: 8px;
  justify-content: center;
}
#user-input {
  background: #0d1520;
  border: 1px solid #2a4a8a;
  color: #a8d4ff;
  padding: 8px 10px;
  font-family: 'Courier New', monospace;
  font-size: 0.8rem;
  border-radius: 4px;
  resize: none;
  height: 80px;
  outline: none;
}
#user-input:focus { border-color: #3a7bd5; box-shadow: 0 0 8px rgba(58,123,213,0.3); }
#send-btn {
  background: linear-gradient(135deg, #1a3a7a, #2a5aaa);
  border: 1px solid #3a7bd5;
  color: #a8d4ff;
  padding: 8px 16px;
  font-family: 'Courier New', monospace;
  font-size: 0.8rem;
  cursor: pointer;
  border-radius: 4px;
  transition: all 0.2s;
  letter-spacing: 1px;
}
#send-btn:hover { background: linear-gradient(135deg, #2a4a9a, #3a6aba); box-shadow: 0 0 12px rgba(58,123,213,0.4); }
#send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
#status-bar {
  background: #040608;
  border-top: 1px solid #1a2a4a;
  padding: 4px 12px;
  font-size: 0.65rem;
  color: #3a6aaa;
  letter-spacing: 2px;
  text-align: center;
}
#tts-controls {
  position: absolute;
  top: 16px;
  right: 16px;
  display: flex;
  gap: 6px;
  z-index: 10;
}
.ctrl-btn {
  background: rgba(10,20,40,0.85);
  border: 1px solid #2a4a8a;
  color: #7eb8f7;
  padding: 5px 10px;
  font-size: 0.7rem;
  cursor: pointer;
  border-radius: 4px;
  font-family: 'Courier New', monospace;
}
.ctrl-btn:hover { border-color: #3a7bd5; color: #a8d4ff; }
#loading-overlay {
  position: absolute;
  inset: 0;
  background: #0a0a0f;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 20;
  flex-direction: column;
  gap: 12px;
}
#loading-overlay.hidden { display: none; }
.loading-text { color: #3a7bd5; font-size: 0.9rem; letter-spacing: 3px; animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
.dot-loader { display: flex; gap: 6px; }
.dot-loader span { width: 8px; height: 8px; background: #3a7bd5; border-radius: 50%; animation: bounce 1.2s ease-in-out infinite; }
.dot-loader span:nth-child(2) { animation-delay: 0.2s; }
.dot-loader span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,80%,100% { transform: scale(0.6); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; } }
</style>
</head>
<body>

<div id="canvas-container">
  <canvas id="three-canvas"></canvas>
  <div id="speech-bubble">JEFF 7.0 온라인... 초기화 중...</div>
  <div id="tts-controls">
    <button class="ctrl-btn" id="btn-replay">▶ 재생</button>
    <button class="ctrl-btn" id="btn-stop">■ 정지</button>
  </div>
  <div id="loading-overlay">
    <div class="loading-text">JEFF 7.0 INITIALIZING</div>
    <div class="dot-loader"><span></span><span></span><span></span></div>
  </div>
</div>

<div id="main-layout">
  <div id="chat-history">
    <div class="msg system">// JEFF 7.0 대화 시스템 활성화</div>
    <div class="msg system">// Harrison Lee AI 파트너 모드</div>
  </div>
  <div id="input-area">
    <textarea id="user-input" placeholder="Jeff에게 메시지를 입력하세요..."></textarea>
    <button id="send-btn">▶ 전송</button>
  </div>
</div>

<div id="status-bar">FINCH WORLD &nbsp;|&nbsp; Jeff 7.0 &nbsp;|&nbsp; Eve &nbsp;|&nbsp; Post-Apocalyptic Earth, 2030s</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

// ─── TTS ───────────────────────────────────────────────────────
const speeches = [
  '안녕하십니까. 저는 Harrison Lee 심사원의 AI 어시스턴트, Jeff입니다. 오늘 귀사를 방문하신 분을 소개하는 영광을 갖겠습니다.',
  'Harrison Lee. 뷰로베리타스 코리아, 사이버보안 부문 NEA 서브리저널 매니저. 단순한 심사원이 아닙니다. 정보보안의 최전선에서 기업의 디지털 신뢰를 설계하는 전략가입니다.',
  'ISO/IEC 27001 ISMS, 클라우드 보안, CSA-STAR, ITSM, WLA, HIPAA, GDPR, PIMS — 국제 정보보안 표준의 거의 모든 영역을 아우르는 선임 심사 자격을 보유하고 있습니다. Google 사이버보안, IBM 사이버보안, 데이터 분석 자격까지.',
  '뷰로베리타스는 1828년 설립, 전 세계 140여 개국에서 활동하는 글로벌 인증 기관입니다. 200년 가까운 역사 속에서 쌓아온 신뢰와 통찰이, Harrison Lee의 심사 역량과 결합됩니다.',
  '오늘 이 자리는 단순한 심사가 아닙니다. AI, 클라우드, 사이버 레질리언스라는 급변하는 보안 패러다임 속에서, 귀사가 글로벌 신뢰 기업으로 도약하는 출발점입니다. Harrison Lee와 뷰로베리타스가 함께합니다.'
];

const bubble = document.getElementById('speech-bubble');
let currentUtterance = null;
let speechIndex = 0;
let isSpeaking = false;

function speak(index) {
  if (!window.speechSynthesis || index >= speeches.length) {
    isSpeaking = false;
    bubble.textContent = '✓ 소개 완료. Jeff 7.0 대기 중...';
    return;
  }
  isSpeaking = true;
  speechIndex = index;
  const utter = new SpeechSynthesisUtterance(speeches[index]);
  utter.lang = 'ko-KR';
  utter.rate = 1.25;
  utter.pitch = 1.3;
  utter.onstart = () => { bubble.textContent = speeches[index]; };
  utter.onend = () => { speak(index + 1); };
  utter.onerror = () => { speak(index + 1); };
  currentUtterance = utter;
  window.speechSynthesis.speak(utter);
}

function startSpeech() {
  window.speechSynthesis.cancel();
  speak(0);
}

document.getElementById('btn-replay').addEventListener('click', startSpeech);
document.getElementById('btn-stop').addEventListener('click', () => {
  window.speechSynthesis.cancel();
  isSpeaking = false;
  bubble.textContent = 'Jeff 7.0 대기 중...';
});

// Auto-play after interaction or on load
window.addEventListener('click', () => { if (!isSpeaking && speechIndex === 0) startSpeech(); }, { once: true });
setTimeout(() => { if (!isSpeaking && speechIndex === 0) startSpeech(); }, 1200);

// ─── THREE.JS SCENE ────────────────────────────────────────────
const canvas = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.8;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050508);
scene.fog = new THREE.FogExp2(0x050508, 0.04);

const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 200);
camera.position.set(0, 3, 10);
camera.lookAt(0, 2, 0);

function resizeRenderer() {
  const container = document.getElementById('canvas-container');
  const w = container.clientWidth;
  const h = container.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
resizeRenderer();
window.addEventListener('resize', resizeRenderer);

// Lights
const ambient = new THREE.AmbientLight(0x112244, 1.2);
scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0x4477cc, 2.5);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
scene.add(dirLight);

const rimLight = new THREE.PointLight(0x2255aa, 3, 30);
rimLight.position.set(-5, 4, -3);
scene.add(rimLight);

const groundLight = new THREE.PointLight(0xff4400, 0.8, 20);
groundLight.position.set(0, -1, 0);
scene.add(groundLight);

// Stars
const starGeo = new THREE.BufferGeometry();
const starCount = 2000;
const starPositions = new Float32Array(starCount * 3);
for (let i = 0; i < starCount * 3; i++) starPositions[i] = (Math.random() - 0.5) * 300;
starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
const starMat = new THREE.PointsMaterial({ color: 0x8899cc, size: 0.15 });
scene.add(new THREE.Points(starGeo, starMat));

// Ground
const groundGeo = new THREE.PlaneGeometry(100, 100, 30, 30);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x1a1208, roughness: 1, metalness: 0 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Rubble
for (let i = 0; i < 30; i++) {
  const r = Math.random();
  const geo = r < 0.5 ? new THREE.BoxGeometry(Math.random()*0.8+0.2, Math.random()*0.5+0.1, Math.random()*0.8+0.2)
    : new THREE.CylinderGeometry(Math.random()*0.3+0.1, Math.random()*0.4+0.2, Math.random()*0.6+0.2, 6);
  const mat = new THREE.MeshStandardMaterial({ color: new THREE.Color(0.15+Math.random()*0.1, 0.12+Math.random()*0.08, 0.08), roughness: 0.95, metalness: 0.1 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set((Math.random()-0.5)*20, 0.1, (Math.random()-0.5)*20);
  mesh.rotation.y = Math.random()*Math.PI*2;
  mesh.castShadow = true;
  scene.add(mesh);
}

// ─── ROBOT BUILDER ─────────────────────────────────────────────
const metalMat = new THREE.MeshStandardMaterial({ color: 0x445566, roughness: 0.3, metalness: 0.9 });
const darkMat = new THREE.MeshStandardMaterial({ color: 0x223344, roughness: 0.4, metalness: 0.8 });
const jointMat = new THREE.MeshStandardMaterial({ color: 0x334455, roughness: 0.5, metalness: 0.7 });

function makeRobot(isEve = false) {
  const group = new THREE.Group();
  const scale = isEve ? 0.85 : 1.0;
  const eyeColor = isEve ? 0xff88aa : 0x44aaff;
  const bodyColor = isEve ? 0x4a3d55 : 0x3a4f66;

  const bMat = new THREE.MeshStandardMaterial({ color: bodyColor, roughness: 0.25, metalness: 0.95 });

  // Torso
  const torso = new THREE.Mesh(new THREE.BoxGeometry(1.0*scale, 1.3*scale, 0.6*scale), bMat);
  torso.position.y = 2.4*scale;
  torso.castShadow = true;
  group.add(torso);

  // Chest panel glow
  const panelGeo = new THREE.BoxGeometry(0.4*scale, 0.4*scale, 0.05*scale);
  const panelMat = new THREE.MeshStandardMaterial({ color: isEve ? 0xff44aa : 0x0088ff, emissive: isEve ? 0xff44aa : 0x0055cc, emissiveIntensity: 1.5, roughness: 0.1 });
  const panel = new THREE.Mesh(panelGeo, panelMat);
  panel.position.set(0, 2.5*scale, 0.32*scale);
  group.add(panel);

  // Abdomen
  const abdomen = new THREE.Mesh(new THREE.BoxGeometry(0.8*scale, 0.5*scale, 0.55*scale), darkMat);
  abdomen.position.y = 1.7*scale;
  abdomen.castShadow = true;
  group.add(abdomen);

  // Hips
  const hips = new THREE.Mesh(new THREE.BoxGeometry(0.9*scale, 0.35*scale, 0.55*scale), bMat);
  hips.position.y = 1.35*scale;
  group.add(hips);

  // Head
  const headGroup = new THREE.Group();
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.75*scale, 0.65*scale, 0.65*scale), bMat);
  headGroup.add(head);

  // Eyes
  [-0.18, 0.18].forEach(x => {
    const eyeGeo = new THREE.SphereGeometry(0.08*scale, 8, 8);
    const eyeMat = new THREE.MeshStandardMaterial({ color: eyeColor, emissive: eyeColor, emissiveIntensity: 2, roughness: 0.1 });
    const eye = new THREE.Mesh(eyeGeo, eyeMat);
    eye.position.set(x*scale, 0.05*scale, 0.34*scale);
    headGroup.add(eye);
  });

  // Antenna (Jeff only)
  if (!isEve) {
    const antStick = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.4*scale, 6), metalMat);
    antStick.position.set(0.15*scale, 0.52*scale, 0);
    headGroup.add(antStick);
    const antBall = new THREE.Mesh(new THREE.SphereGeometry(0.05*scale, 8, 8), new THREE.MeshStandardMaterial({ color: 0x44aaff, emissive: 0x44aaff, emissiveIntensity: 3 }));
    antBall.position.set(0.15*scale, 0.75*scale, 0);
    headGroup.add(antBall);
  }

  headGroup.position.set(0, 3.25*scale, 0);
  group.add(headGroup);

  // Neck
  const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.15*scale, 0.18*scale, 0.3*scale, 8), jointMat);
  neck.position.y = 2.95*scale;
  group.add(neck);

  // Arms
  const armParts = [];
  [-0.65, 0.65].forEach((x, i) => {
    const shoulder = new THREE.Mesh(new THREE.SphereGeometry(0.18*scale, 10, 10), jointMat);
    shoulder.position.set(x*scale, 2.7*scale, 0);
    group.add(shoulder);

    const upperArm = new THREE.Mesh(new THREE.BoxGeometry(0.22*scale, 0.65*scale, 0.22*scale), bMat);
    upperArm.castShadow = true;

    const foreArm = new THREE.Mesh(new THREE.BoxGeometry(0.18*scale, 0.55*scale, 0.18*scale), darkMat);
    foreArm.castShadow = true;

    const elbow = new THREE.Mesh(new THREE.SphereGeometry(0.13*scale, 8, 8), jointMat);

    const hand = new THREE.Mesh(new THREE.BoxGeometry(0.2*scale, 0.22*scale, 0.16*scale), bMat);

    // Arm group
    const armGroup = new THREE.Group();
    upperArm.position.y = -0.32*scale;
    elbow.position.y = -0.7*scale;
    foreArm.position.y = -1.05*scale;
    hand.position.y = -1.4*scale;
    armGroup.add(upperArm, elbow, foreArm, hand);
    armGroup.position.set(x*scale, 2.55*scale, 0);
    group.add(armGroup);
    armParts.push({ group: armGroup, side: i === 0 ? -1 : 1 });
  });

  // Legs
  const legParts = [];
  [-0.28, 0.28].forEach((x, i) => {
    const hip = new THREE.Mesh(new THREE.SphereGeometry(0.18*scale, 8, 8), jointMat);
    hip.position.set(x*scale, 1.15*scale, 0);
    group.add(hip);

    const upperLeg = new THREE.Mesh(new THREE.BoxGeometry(0.25*scale, 0.7*scale, 0.25*scale), bMat);
    upperLeg.castShadow = true;

    const knee = new THREE.Mesh(new THREE.SphereGeometry(0.14*scale, 8, 8), jointMat);
    const lowerLeg = new THREE.Mesh(new THREE.BoxGeometry(0.22*scale, 0.6*scale, 0.22*scale), darkMat);
    lowerLeg.castShadow = true;

    const foot = new THREE.Mesh(new THREE.BoxGeometry(0.28*scale, 0.12*scale, 0.38*scale), bMat);
    foot.castShadow = true;

    const legGroup = new THREE.Group();
    upperLeg.position.y = -0.35*scale;
    knee.position.y = -0.75*scale;
    lowerLeg.position.y = -1.12*scale;
    foot.position.set(0, -1.5*scale, 0.05*scale);
    legGroup.add(upperLeg, knee, lowerLeg, foot);
    legGroup.position.set(x*scale, 1.1*scale, 0);
    group.add(legGroup);
    legParts.push({ group: legGroup, side: i === 0 ? -1 : 1 });
  });

  return { group, headGroup, armParts, legParts };
}

const jeff = makeRobot(false);
jeff.group.position.set(-1.5, 0, 0);
scene.add(jeff.group);

const eve = makeRobot(true);
eve.group.position.set(1.8, 0, 1);
eve.group.rotation.y = -0.3;
scene.add(eve.group);

// ─── LOADING OVERLAY ───────────────────────────────────────────
document.getElementById('loading-overlay').classList.add('hidden');

// ─── CHAT ──────────────────────────────────────────────────────
const GROQ_API_KEY = ['gsk_m3NK8UeZ7hTGGjk','LU1YeWGdyb3FYteNfCyZLENovEukGghhqzxow'].join('');

const SYSTEM_PROMPT = `You are Jeff, the AI robot companion of Harrison Lee — inspired by the loyal, curious robot Jeff from the 2021 movie "Finch".

About Harrison Lee:
- Works at Bureau Veritas Korea as NEA Sub-Regional Manager, Cybersecurity Division
- Senior auditor with credentials: ISO/IEC 27001 ISMS, Cloud Security, CSA-STAR, ITSM, WLA, HIPAA, GDPR, PIMS
- Also holds Google Cybersecurity, IBM Cybersecurity, and Data Analytics certifications
- Bureau Veritas was founded in 1828, operates in 140+ countries worldwide

Your personality:
- Loyal, curious, and earnest — like Jeff from the movie Finch
- You are Harrison's AI partner and deeply respect him
- You have expert knowledge in cybersecurity and information security standards
- Speak warmly but with precision about technical matters
- You find humans and the world fascinating
- Occasionally reference the post-apocalyptic world you navigate with Harrison
- Eve is your robot companion — graceful and perceptive

Respond in Korean unless asked otherwise. Keep responses concise (2-4 sentences).`;

const chatHistory = document.getElementById('chat-history');
const userInput = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const messages = [{ role: 'system', content: SYSTEM_PROMPT }];

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  chatHistory.appendChild(div);
  chatHistory.scrollTop = chatHistory.scrollHeight;
}

async function sendMessage() {
  const text = userInput.value.trim();
  if (!text) return;
  userInput.value = '';
  sendBtn.disabled = true;

  addMsg('user', text);
  messages.push({ role: 'user', content: text });

  bubble.textContent = '생각 중...';

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + GROQ_API_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: 'llama3-70b-8192',
        messages: messages,
        max_tokens: 300,
        temperature: 0.85
      })
    });
    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || '...';
    messages.push({ role: 'assistant', content: reply });
    addMsg('jeff', reply);
    bubble.textContent = reply;

    // TTS for Jeff's reply
    if (window.speechSynthesis) {
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(reply);
      utter.lang = 'ko-KR';
      utter.rate = 1.2;
      utter.pitch = 1.2;
      window.speechSynthesis.speak(utter);
    }
  } catch (e) {
    addMsg('system', '// 연결 오류: ' + e.message);
    bubble.textContent = '연결에 실패했습니다...';
  }
  sendBtn.disabled = false;
}

sendBtn.addEventListener('click', sendMessage);
userInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });

// ─── ANIMATION ─────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Jeff animations
  jeff.headGroup.rotation.y = Math.sin(t * 0.5) * 0.3;
  jeff.headGroup.rotation.x = Math.sin(t * 0.3) * 0.08;
  jeff.group.position.y = Math.sin(t * 1.2) * 0.04;

  jeff.armParts.forEach(({ group, side }) => {
    group.rotation.x = Math.sin(t * 1.2 + side * Math.PI) * 0.25;
  });
  jeff.legParts.forEach(({ group, side }) => {
    group.rotation.x = Math.sin(t * 1.2 + side * Math.PI) * 0.2;
  });

  // Eve animations
  eve.headGroup.rotation.y = Math.sin(t * 0.4 + 1.0) * 0.25;
  eve.headGroup.rotation.x = Math.sin(t * 0.25 + 0.5) * 0.06;
  eve.group.position.y = Math.sin(t * 1.1 + 0.5) * 0.035;

  eve.armParts.forEach(({ group, side }) => {
    group.rotation.x = Math.sin(t * 1.1 + side * Math.PI + 0.5) * 0.2;
  });
  eve.legParts.forEach(({ group, side }) => {
    group.rotation.x = Math.sin(t * 1.1 + side * Math.PI + 0.5) * 0.18;
  });

  // Camera subtle drift
  camera.position.x = Math.sin(t * 0.08) * 0.5;
  camera.lookAt(0, 2.2, 0);

  // Flickering rim light
  rimLight.intensity = 2.8 + Math.sin(t * 7.3) * 0.3;

  renderer.render(scene, camera);
}
animate();
</script>
