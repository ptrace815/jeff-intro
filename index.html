<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeff ??AI Robot NPC</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  #scene-container {
    flex: 1;
    position: relative;
    min-height: 0;
  }
  canvas { display: block; }

  /* Dialog balloon */
  #balloon {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(20, 25, 40, 0.92);
    border: 1px solid rgba(100, 180, 255, 0.3);
    border-radius: 16px;
    padding: 16px 24px;
    max-width: 560px;
    min-height: 48px;
    font-size: 15px;
    line-height: 1.7;
    color: #c8daf0;
    text-align: center;
    backdrop-filter: blur(8px);
    box-shadow: 0 0 30px rgba(60, 140, 255, 0.15);
    transition: opacity 0.4s;
    z-index: 10;
  }
  #balloon.hidden { opacity: 0; pointer-events: none; }
  #balloon .speaker { color: #6ab4ff; font-weight: 600; margin-bottom: 6px; font-size: 13px; letter-spacing: 1px; }

  /* Chat history */
  #chat-log {
    position: absolute;
    right: 16px;
    top: 16px;
    bottom: 100px;
    width: 280px;
    overflow-y: auto;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 8px;
    scrollbar-width: thin;
    scrollbar-color: rgba(100,180,255,0.2) transparent;
  }
  .chat-msg {
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.5;
    max-width: 95%;
    animation: fadeIn 0.3s;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .chat-msg.user {
    align-self: flex-end;
    background: rgba(80, 120, 200, 0.2);
    border: 1px solid rgba(80, 120, 200, 0.3);
    color: #a0c0e8;
  }
  .chat-msg.jeff {
    align-self: flex-start;
    background: rgba(40, 60, 80, 0.3);
    border: 1px solid rgba(100, 180, 255, 0.15);
    color: #c8daf0;
  }
  .chat-msg .label { font-size: 11px; color: #667; margin-bottom: 2px; }

  /* Bottom controls */
  #controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 16px;
    background: rgba(10, 10, 20, 0.95);
    border-top: 1px solid rgba(100, 180, 255, 0.15);
    z-index: 10;
  }
  #text-input {
    flex: 0 1 320px;
    padding: 10px 16px;
    border-radius: 24px;
    border: 1px solid rgba(100, 180, 255, 0.25);
    background: rgba(20, 25, 40, 0.8);
    color: #c8daf0;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  #text-input:focus { border-color: #6ab4ff; }
  #text-input::placeholder { color: #445; }

  #mic-btn, #send-btn, #sing-btn {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: 2px solid rgba(100, 180, 255, 0.3);
    background: rgba(30, 40, 70, 0.8);
    color: #6ab4ff;
    font-size: 22px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #mic-btn:hover, #send-btn:hover, #sing-btn:hover { background: rgba(50, 70, 120, 0.8); border-color: #6ab4ff; }
  #sing-btn { border-color: rgba(255, 180, 50, 0.4); color: #ffb432; }
  #sing-btn:hover { border-color: #ffb432; background: rgba(80, 60, 20, 0.8); }
  #mic-btn.recording {
    border-color: #ff6060;
    background: rgba(80, 20, 20, 0.8);
    color: #ff6060;
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255, 96, 96, 0.4); }
    50% { box-shadow: 0 0 0 12px rgba(255, 96, 96, 0); }
  }
  #status {
    font-size: 12px;
    color: #556;
    min-width: 100px;
    text-align: center;
  }
  .thinking::after {
    content: '';
    animation: dots 1.5s infinite;
  }
  @keyframes dots {
    0% { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }
  .env-text {
    position: absolute;
    bottom: 8px;
    left: 16px;
    font-size: 11px;
    color: rgba(100, 140, 180, 0.3);
    z-index: 5;
    font-family: monospace;
  }
</style>
</head>
<body>

<div id="scene-container">
  <div id="balloon" class="hidden">
    <div class="speaker">??JEFF</div>
    <div id="balloon-text"></div>
  </div>
  <div id="chat-log"></div>
  <div class="env-text">FINCH WORLD ??Jeff ?ВӨГҜВёВҸ Eve | Post-Apocalyptic Earth, 2030s</div>
</div>

<div id="controls">
  <input id="text-input" type="text" placeholder="?ВңГӯВ”В„?ВҗГӘВІВҢ Г«В§ВҗГӯВ•ВҳГӘВё?.. (Enter)" autocomplete="off">
  <button id="mic-btn" title="?ВҢГ¬В„Вұ ?В…Г«В ВҘ (Space)">?ВҺВӨ</button>
  <button id="sing-btn" title="?ВёГ«ВһВҳ ?ВңГ¬ВјВңГ«ВіВҙГӘВёВ°">?ВҺВө</button>
  <button id="trot-btn" title="?ВёГ«ВЎВң???ВңГ¬ВјВңГ«ВіВҙГӘВёВ°" style="width:52px;height:52px;border-radius:50%;border:2px solid rgba(255,100,100,0.4);background:rgba(70,20,30,0.8);color:#ff6666;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;">?ВҺВӨ</button>
  <button id="send-btn" title="Г«ВіВҙГ«ВӮВҙГӘВё?>??/button>
  <span id="status">Г¬ВӨВҖГ«В№??В„Г«ВЈВҢ</span>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

const container = document.getElementById('scene-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a12);
scene.fog = new THREE.FogExp2(0x0a0a12, 0.008);

const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 200);
camera.position.set(0.5, 2.4, 8.5);
camera.lookAt(0.5, 1.4, 0.5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.8;
container.appendChild(renderer.domElement);

// Lights
scene.add(new THREE.AmbientLight(0x334466, 0.5));
const dirLight = new THREE.DirectionalLight(0xffeedd, 1.0);
dirLight.position.set(5, 8, 5);
dirLight.castShadow = true;
scene.add(dirLight);
const blueLight = new THREE.PointLight(0x4488ff, 2, 15);
blueLight.position.set(-2, 3, 2);
scene.add(blueLight);
const warmLight = new THREE.PointLight(0xff8844, 0.5, 10);
warmLight.position.set(3, 2, -1);
scene.add(warmLight);

// Ground
const ground = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({ color: 0x1a1510, roughness: 0.95 }));
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Debris
for (let i = 0; i < 40; i++) {
  const s = Math.random() * 0.3 + 0.05;
  const m = new THREE.Mesh(new THREE.BoxGeometry(s, s * 0.5, s), new THREE.MeshStandardMaterial({ color: 0x222018, roughness: 0.9 }));
  m.position.set((Math.random() - 0.5) * 40, s * 0.25, (Math.random() - 0.5) * 40 - 2);
  m.rotation.y = Math.random() * Math.PI;
  m.castShadow = true;
  scene.add(m);
}

// Dust particles
const particleCount = 500;
const particleGeo = new THREE.BufferGeometry();
const pPositions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount * 3; i += 3) {
  pPositions[i] = (Math.random() - 0.5) * 30;
  pPositions[i + 1] = Math.random() * 8;
  pPositions[i + 2] = (Math.random() - 0.5) * 30;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
const particles = new THREE.Points(particleGeo, new THREE.PointsMaterial({ color: 0x886644, size: 0.03, transparent: true, opacity: 0.4 }));
scene.add(particles);

// ============================================================
//  BUILD ROBOT JEFF
// ============================================================
const robotGroup = new THREE.Group();
scene.add(robotGroup);

// Sleek white humanoid materials
const whiteMat = new THREE.MeshStandardMaterial({ color: 0xf0f0f5, metalness: 0.3, roughness: 0.15 });
const lightGrayMat = new THREE.MeshStandardMaterial({ color: 0xd8d8e0, metalness: 0.35, roughness: 0.2 });
const darkMat = new THREE.MeshStandardMaterial({ color: 0x1a1a22, metalness: 0.8, roughness: 0.1 });
const visorMat = new THREE.MeshStandardMaterial({ color: 0x0a0a12, metalness: 0.95, roughness: 0.05 });
const eyeMat = new THREE.MeshStandardMaterial({ color: 0x44ccff, emissive: 0x22aaee, emissiveIntensity: 2.0 });
const jointMat = new THREE.MeshStandardMaterial({ color: 0x888890, metalness: 0.6, roughness: 0.25 });
const accentMat = new THREE.MeshStandardMaterial({ color: 0x44aaff, emissive: 0x2266cc, emissiveIntensity: 0.5 });
const glowMat = new THREE.MeshStandardMaterial({ color: 0x44ccff, emissive: 0x44aaff, emissiveIntensity: 3, transparent: true, opacity: 0.9 });

// --- TORSO (sleek rounded) ---
const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.38, 0.42, 1.2, 16), whiteMat);
torso.position.y = 1.8; torso.castShadow = true; robotGroup.add(torso);

// Chest armor plate
const chestPlate = new THREE.Mesh(new THREE.CylinderGeometry(0.34, 0.36, 0.6, 16), lightGrayMat);
chestPlate.position.set(0, 1.9, 0.02); robotGroup.add(chestPlate);

// Core reactor (subtle glow)
const coreGlow = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), glowMat);
coreGlow.position.set(0, 1.95, 0.36); robotGroup.add(coreGlow);

// Chest accent lines
for (let j = 0; j < 3; j++) {
  const line = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.008, 0.01), accentMat);
  line.position.set(0, 1.7 + j * 0.08, 0.38); robotGroup.add(line);
}

// --- HEAD (smooth helmet with visor) ---
const head = new THREE.Mesh(new THREE.SphereGeometry(0.32, 24, 24), whiteMat);
head.position.y = 2.72; head.castShadow = true; robotGroup.add(head);

// Smooth visor (dark curved strip)
const visor = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.28, 0.08, 24, 1, false, -0.8, 1.6), visorMat);
visor.position.set(0, 2.74, 0.12); visor.rotation.x = Math.PI / 2; robotGroup.add(visor);

// Eye glow behind visor
const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.035, 16, 16), eyeMat);
leftEye.position.set(-0.09, 2.74, 0.28); robotGroup.add(leftEye);
const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.035, 16, 16), eyeMat);
rightEye.position.set(0.09, 2.74, 0.28); robotGroup.add(rightEye);

// Mouth (thin light strip)
const mouth = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.01, 0.01),
  new THREE.MeshStandardMaterial({ color: 0x44ccff, emissive: 0x22aaee, emissiveIntensity: 1.0 }));
mouth.position.set(0, 2.64, 0.30); robotGroup.add(mouth);

// Head crest line
const crest = new THREE.Mesh(new THREE.BoxGeometry(0.01, 0.25, 0.01), accentMat);
crest.position.set(0, 2.88, 0.15); robotGroup.add(crest);

// No antenna (replaced with clean crest)
const antennaTop = new THREE.Mesh(new THREE.SphereGeometry(0.015, 8, 8), eyeMat);
antennaTop.position.set(0, 3.02, 0.15); robotGroup.add(antennaTop);

// --- NECK ---
const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.12, 0.2, 12), jointMat);
neck.position.y = 2.4; robotGroup.add(neck);

// --- SHOULDERS (rounded armor) ---
[-1, 1].forEach(side => {
  const shoulder = new THREE.Mesh(new THREE.SphereGeometry(0.14, 16, 16), whiteMat);
  shoulder.position.set(side * 0.56, 2.32, 0); robotGroup.add(shoulder);
  // Shoulder accent ring
  const ring = new THREE.Mesh(new THREE.TorusGeometry(0.12, 0.015, 8, 16), accentMat);
  ring.position.set(side * 0.56, 2.32, 0); ring.rotation.y = Math.PI / 2; robotGroup.add(ring);
});

// --- ARMS ---
const leftArm = new THREE.Group();
const rightArm = new THREE.Group();
[leftArm, rightArm].forEach((arm, i) => {
  const side = i === 0 ? -1 : 1;
  // Upper arm (smooth cylinder)
  const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.065, 0.07, 0.5, 12), whiteMat);
  upper.position.set(0, -0.3, 0); arm.add(upper);
  // Elbow (sphere joint)
  const elbow = new THREE.Mesh(new THREE.SphereGeometry(0.075, 12, 12), jointMat);
  elbow.position.set(0, -0.58, 0); arm.add(elbow);
  // Forearm
  const lower = new THREE.Mesh(new THREE.CylinderGeometry(0.055, 0.065, 0.45, 12), whiteMat);
  lower.position.set(0, -0.85, 0); arm.add(lower);
  // Wrist accent
  const wrist = new THREE.Mesh(new THREE.TorusGeometry(0.06, 0.008, 8, 12), accentMat);
  wrist.position.set(0, -1.05, 0); arm.add(wrist);
  // Hand (sleek)
  const hand = new THREE.Mesh(new THREE.SphereGeometry(0.07, 12, 12), lightGrayMat);
  hand.position.set(0, -1.14, 0); arm.add(hand);
  // Fingers (5 slim)
  for (let f = -2; f <= 2; f++) {
    const finger = new THREE.Mesh(new THREE.CylinderGeometry(0.012, 0.01, 0.07, 6), jointMat);
    finger.position.set(f * 0.02, -1.23, 0); arm.add(finger);
  }
  arm.position.set(side * 0.56, 2.32, 0); robotGroup.add(arm);
});

// --- HIPS/WAIST ---
const hips = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.32, 0.25, 14), lightGrayMat);
hips.position.y = 1.1; robotGroup.add(hips);
const belt = new THREE.Mesh(new THREE.TorusGeometry(0.36, 0.02, 8, 24), accentMat);
belt.position.y = 1.22; belt.rotation.x = Math.PI / 2; robotGroup.add(belt);

// --- LEGS ---
const leftLeg = new THREE.Group();
const rightLeg = new THREE.Group();
[leftLeg, rightLeg].forEach((leg, i) => {
  const side = i === 0 ? -1 : 1;
  // Hip joint
  leg.add(new THREE.Mesh(new THREE.SphereGeometry(0.1, 12, 12), jointMat));
  // Upper leg (thigh)
  const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.085, 0.48, 12), whiteMat);
  upper.position.set(0, -0.28, 0); leg.add(upper);
  // Knee
  const knee = new THREE.Mesh(new THREE.SphereGeometry(0.09, 12, 12), jointMat);
  knee.position.set(0, -0.55, 0); leg.add(knee);
  // Lower leg (shin)
  const lower = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.075, 0.48, 12), whiteMat);
  lower.position.set(0, -0.82, 0); leg.add(lower);
  // Ankle accent
  const ankle = new THREE.Mesh(new THREE.TorusGeometry(0.07, 0.008, 8, 12), accentMat);
  ankle.position.set(0, -1.04, 0); leg.add(ankle);
  // Foot (sleek, futuristic)
  const foot = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.08, 0.28), lightGrayMat);
  foot.position.set(0, -1.1, 0.04); leg.add(foot);
  // Toe cap
  const toeCap = new THREE.Mesh(new THREE.SphereGeometry(0.06, 12, 6, 0, Math.PI * 2, 0, Math.PI / 2), whiteMat);
  toeCap.position.set(0, -1.08, 0.14); toeCap.rotation.x = -Math.PI / 2; leg.add(toeCap);
  leg.position.set(side * 0.22, 0.95, 0); robotGroup.add(leg);
});

robotGroup.position.x = -1.5;

// ============================================================
//  BUILD EVE ??Jeff's Girlfriend
// ============================================================
const eveGroup = new THREE.Group();
scene.add(eveGroup);

// Eve ??Sleek elegant humanoid robot
const eveMat = new THREE.MeshStandardMaterial({ color: 0xfaf5ff, metalness: 0.3, roughness: 0.12 });
const eveLightMat = new THREE.MeshStandardMaterial({ color: 0xeee5f5, metalness: 0.35, roughness: 0.18 });
const eveDarkMat = new THREE.MeshStandardMaterial({ color: 0x1a1020, metalness: 0.85, roughness: 0.08 });
const eveEyeMat = new THREE.MeshStandardMaterial({ color: 0xff66cc, emissive: 0xee44aa, emissiveIntensity: 2.2 });
const eveAccentMat = new THREE.MeshStandardMaterial({ color: 0xff77cc, emissive: 0xcc3399, emissiveIntensity: 0.6 });
const eveJointMat = new THREE.MeshStandardMaterial({ color: 0x9088a0, metalness: 0.6, roughness: 0.22 });
const eveGlowMat = new THREE.MeshStandardMaterial({ color: 0xff88dd, emissive: 0xff44bb, emissiveIntensity: 3, transparent: true, opacity: 0.9 });

// --- TORSO (elegant hourglass shape) ---
const eveTorso = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.36, 1.1, 16), eveMat);
eveTorso.position.y = 1.8; eveTorso.castShadow = true; eveGroup.add(eveTorso);

// Chest armor (slim)
const eveChestArmor = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.30, 0.5, 16), eveLightMat);
eveChestArmor.position.set(0, 1.9, 0.02); eveGroup.add(eveChestArmor);

// Heart core (pink glow)
const eveCore = new THREE.Mesh(new THREE.SphereGeometry(0.05, 16, 16), eveGlowMat);
eveCore.position.set(0, 1.95, 0.32); eveGroup.add(eveCore);

const eveHeart1 = new THREE.Mesh(new THREE.SphereGeometry(0.03, 12, 12),
  new THREE.MeshStandardMaterial({ color: 0xff66bb, emissive: 0xff2299, emissiveIntensity: 2.5 }));
eveHeart1.position.set(-0.025, 1.97, 0.33); eveGroup.add(eveHeart1);
const eveHeart2 = new THREE.Mesh(new THREE.SphereGeometry(0.03, 12, 12),
  new THREE.MeshStandardMaterial({ color: 0xff66bb, emissive: 0xff2299, emissiveIntensity: 2.5 }));
eveHeart2.position.set(0.025, 1.97, 0.33); eveGroup.add(eveHeart2);

// Chest accent lines (pink)
for (let j = 0; j < 3; j++) {
  const line = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.006, 0.008), eveAccentMat);
  line.position.set(0, 1.7 + j * 0.07, 0.34); eveGroup.add(line);
}

// --- HEAD (smooth elegant helmet) ---
const eveHead = new THREE.Mesh(new THREE.SphereGeometry(0.3, 24, 24), eveMat);
eveHead.position.y = 2.72; eveHead.castShadow = true; eveGroup.add(eveHead);

// Elegant visor (slimmer, more feminine)
const eveVisor = new THREE.Mesh(new THREE.CylinderGeometry(0.26, 0.26, 0.06, 24, 1, false, -0.7, 1.4), eveDarkMat);
eveVisor.position.set(0, 2.74, 0.12); eveVisor.rotation.x = Math.PI / 2; eveGroup.add(eveVisor);

// Eyes (pink glow)
const eveLeftEye = new THREE.Mesh(new THREE.SphereGeometry(0.032, 16, 16), eveEyeMat);
eveLeftEye.position.set(-0.08, 2.74, 0.27); eveGroup.add(eveLeftEye);
const eveRightEye = new THREE.Mesh(new THREE.SphereGeometry(0.032, 16, 16), eveEyeMat);
eveRightEye.position.set(0.08, 2.74, 0.27); eveGroup.add(eveRightEye);

// Mouth (delicate pink line)
const eveMouth = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.008, 0.008),
  new THREE.MeshStandardMaterial({ color: 0xff77cc, emissive: 0xdd44aa, emissiveIntensity: 1.2 }));
eveMouth.position.set(0, 2.65, 0.28); eveGroup.add(eveMouth);

// Hair-like flowing fins (elegant antenna ribbons)
const eveRibbon1 = new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.003, 0.35, 8), eveAccentMat);
eveRibbon1.position.set(-0.2, 3.0, -0.08); eveRibbon1.rotation.z = -0.25; eveGroup.add(eveRibbon1);
const eveRibbon2 = new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.003, 0.30, 8), eveAccentMat);
eveRibbon2.position.set(0.2, 2.98, -0.08); eveRibbon2.rotation.z = 0.25; eveGroup.add(eveRibbon2);

// Ribbon tips (glowing)
const eveRibbonTip1 = new THREE.Mesh(new THREE.SphereGeometry(0.018),
  new THREE.MeshStandardMaterial({ color: 0xffaaff, emissive: 0xff66ff, emissiveIntensity: 3 }));
eveRibbonTip1.position.set(-0.28, 3.15, -0.08); eveGroup.add(eveRibbonTip1);
const eveRibbonTip2 = new THREE.Mesh(new THREE.SphereGeometry(0.018),
  new THREE.MeshStandardMaterial({ color: 0xffaaff, emissive: 0xff66ff, emissiveIntensity: 3 }));
eveRibbonTip2.position.set(0.28, 3.12, -0.08); eveGroup.add(eveRibbonTip2);

// Head crest (central elegant line)
const eveCrest = new THREE.Mesh(new THREE.BoxGeometry(0.008, 0.2, 0.008), eveAccentMat);

// ============================================================
let talking = false;
let singing = false;

function animate(time) {
  requestAnimationFrame(animate);
  const t = time * 0.001;

  // --- BV BACKGROUND ANIMATION ---
  bvRing.rotation.z = t * 0.3;
  bvRing.position.x = 0.5 + Math.sin(t * 0.25) * 2.5;
  bvRing.position.y = 4.5 + Math.sin(t * 0.35) * 1.5;
  bvRing.rotation.x = Math.sin(t * 0.2) * 0.4;

  bvRing2.rotation.z = -t * 0.2;
  bvRing2.position.x = 0.5 + Math.sin(t * 0.2 + 2) * 3;
  bvRing2.position.y = 3.5 + Math.sin(t * 0.3 + 1) * 2;
  bvRing2.rotation.x = Math.sin(t * 0.15 + 1) * 0.5;

  bvLight1.intensity = 1.0 + Math.sin(t * 0.5) * 0.3;
  bvLight2.intensity = 0.6 + Math.sin(t * 0.7 + 1) * 0.2;
  bvLight3.intensity = 0.6 + Math.sin(t * 0.7 + 2) * 0.2;
  bvLight4.intensity = 0.5 + Math.sin(t * 0.4) * 0.2;

  // Г«В°В”Г«ВӢВҘ ?В”Г¬???ГӘВ·ВёГ«ВҰВ¬???В Г«ВӢВҲГ«В©В”Г¬ВқВҙ??
  floorCtx.clearRect(0, 0, 2048, 512);
  floorCtx.fillStyle = 'rgba(5, 10, 25, 0.9)';
  floorCtx.fillRect(0, 0, 2048, 512);
  // ГӘВ·ВёГ«ВҰВ¬???ВјГ¬ВқВё
  floorCtx.strokeStyle = 'rgba(26, 107, 255, 0.15)';
  floorCtx.lineWidth = 1;
  for (let gx = 0; gx < 2048; gx += 64) {
    floorCtx.beginPath(); floorCtx.moveTo(gx, 0); floorCtx.lineTo(gx, 512); floorCtx.stroke();
  }
  for (let gy = 0; gy < 512; gy += 64) {
    floorCtx.beginPath(); floorCtx.moveTo(0, gy); floorCtx.lineTo(2048, gy); floorCtx.stroke();
  }
  // ?ВӨГ¬ВәВ” ?ВјГ¬ВқВё (?ВҖГ¬В§ВҒГ¬ВқВҙ??
  const scanY = ((t * 80) % 512);
  floorCtx.strokeStyle = 'rgba(74, 158, 255, 0.5)';
  floorCtx.lineWidth = 2;
  floorCtx.beginPath(); floorCtx.moveTo(0, scanY); floorCtx.lineTo(2048, scanY); floorCtx.stroke();
  // BV ?ВҚГ¬ВҠВӨ??on floor
  floorCtx.fillStyle = 'rgba(74, 158, 255, 0.12)';
  floorCtx.font = '900 160px "Segoe UI", Impact, sans-serif';
  floorCtx.textAlign = 'center';
  floorCtx.fillText('BUREAU VERITAS', 1024, 300);
  floorTexture.needsUpdate = true;

  // ?ВҢГӯВӢВ°???ВЁГ¬ВқВҙГ«Вё?
  const wPos = waveParticles.geometry.attributes.position.array;
  for (let wi = 0; wi < waveCount; wi++) {
    wPos[wi * 3 + 1] = Math.sin(t * 1.5 + wPos[wi * 3] * 0.5) * 0.15 + 0.1;
  }
  waveParticles.geometry.attributes.position.needsUpdate = true;
  waveParticles.material.opacity = 0.4 + Math.sin(t * 0.8) * 0.2;

  // ?ВҖГ«ВЎВңГӘВ·Вё???ВЎГӘВ°ВҒ???ВҢГ¬В В„
  hexGroup.children.forEach(hex => {
    hex.rotation.z += hex.userData.speed * 0.005;
    hex.position.y += Math.sin(t * hex.userData.speed + hex.userData.offset) * 0.002;
    hex.material.opacity = 0.1 + Math.sin(t * hex.userData.speed + hex.userData.offset) * 0.08;
  });

  // ?В°Г¬ВқВҙ???ВӨГӯВҠВёГ«ВҰ??ВҙГ«ВҸВҷ
  streamGroup.children.forEach(s => {
    s.position.x += s.userData.speed * 0.02;
    if (s.position.x > 7) s.position.x = -7;
    s.material.opacity = 0.2 + Math.sin(t * 2 + s.userData.startX) * 0.2;
  });

  // --- JEFF ---
  robotGroup.rotation.y = Math.sin(t * 0.4) * 0.06;
  head.rotation.x = Math.sin(t * 0.6) * 0.04;
  head.rotation.z = Math.sin(t * 0.35) * 0.03;
  leftArm.rotation.x = Math.sin(t * 0.5) * 0.08;
  rightArm.rotation.x = Math.sin(t * 0.5 + 1.2) * 0.08;
  leftLeg.rotation.x = Math.sin(t * 0.3) * 0.02;
  rightLeg.rotation.x = Math.sin(t * 0.3 + Math.PI) * 0.02;
  torso.scale.y = 1 + Math.sin(t * 1.2) * 0.008;

  if (singing) {
    const hue = (t * 60) % 360;
    const r = Math.sin(hue * Math.PI / 180) * 0.5 + 0.5;
    const g = Math.sin((hue + 120) * Math.PI / 180) * 0.5 + 0.5;
    const b = Math.sin((hue + 240) * Math.PI / 180) * 0.5 + 0.5;
    leftEye.material.emissive.setRGB(r * 0.5, g * 0.5, b);
    rightEye.material.emissive.setRGB(r * 0.5, g * 0.5, b);
    leftEye.material.emissiveIntensity = 3.0 + Math.sin(t * 8) * 1.5;
    rightEye.material.emissiveIntensity = 3.0 + Math.sin(t * 8 + 0.5) * 1.5;
    coreGlow.material.emissive.setRGB(r, g * 0.5, b);
    coreGlow.material.emissiveIntensity = 4 + Math.sin(t * 8) * 3;
    mouth.scale.y = 1 + Math.abs(Math.sin(t * 10)) * 3;
    mouth.material.emissiveIntensity = 2.5 + Math.sin(t * 12) * 2;
    head.rotation.z = Math.sin(t * 4) * 0.15;
    head.rotation.x = Math.sin(t * 2) * 0.08;
    robotGroup.rotation.y = Math.sin(t * 2) * 0.15;
    robotGroup.position.y = Math.abs(Math.sin(t * 4)) * 0.1;
    leftArm.rotation.x = Math.sin(t * 4) * 0.5 - 0.3;
    leftArm.rotation.z = Math.sin(t * 2) * 0.3 + 0.2;
    rightArm.rotation.x = Math.sin(t * 4 + Math.PI) * 0.5 - 0.3;
    rightArm.rotation.z = Math.sin(t * 2 + Math.PI) * 0.3 - 0.2;
    leftLeg.rotation.x = Math.sin(t * 4) * 0.1;
    rightLeg.rotation.x = Math.sin(t * 4 + Math.PI) * 0.1;
  } else if (talking) {
    leftEye.material.emissiveIntensity = 2.0 + Math.sin(t * 10) * 1.2;
    rightEye.material.emissiveIntensity = 2.0 + Math.sin(t * 10 + 0.5) * 1.2;
    coreGlow.material.emissiveIntensity = 3 + Math.sin(t * 6) * 2;
    mouth.material.emissiveIntensity = 1.5 + Math.sin(t * 15) * 1.5;
    mouth.scale.y = 1;
    head.rotation.x = Math.sin(t * 3) * 0.06;
    rightArm.rotation.x = Math.sin(t * 2) * 0.2 - 0.1;
    rightArm.rotation.z = Math.sin(t * 1.5) * 0.08;
    robotGroup.position.y = 0;
  } else {
    leftEye.material.emissiveIntensity = 1.0 + Math.sin(t * 1.5) * 0.3;
    rightEye.material.emissiveIntensity = 1.0 + Math.sin(t * 1.5 + 0.3) * 0.3;
    leftEye.material.emissive.setRGB(0.13, 0.4, 0.8);
    rightEye.material.emissive.setRGB(0.13, 0.4, 0.8);
    coreGlow.material.emissive.setRGB(0.27, 0.67, 1.0);
    coreGlow.material.emissiveIntensity = 2 + Math.sin(t * 1.2) * 0.5;
    mouth.material.emissiveIntensity = 0.5 + Math.sin(t * 1) * 0.2;
    mouth.scale.y = 1;
    robotGroup.position.y = 0;
  }

// ============================================================
//  SINGING ENGINE
// ============================================================
const SCALES = {
  major: [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25],
  minor: [261.63, 293.66, 311.13, 349.23, 392.00, 415.30, 466.16, 523.25],
  pentatonic: [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25],
};

let audioContext = null;
function getAudioCtx() {
  if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
  return audioContext;
}

// Trot-specific Г«ВҪВ•Г¬В§Вқ beat generator
function playTrotBeat(durationSec) {
  const ctx = getAudioCtx();
  const masterGain = ctx.createGain();
  masterGain.gain.value = 0.13;
  masterGain.connect(ctx.destination);
  const bpm = 110; // classic trot tempo
  const beatLen = 60 / bpm;
  const totalBeats = Math.ceil(durationSec / beatLen);
  let t = ctx.currentTime + 0.1;

  for (let i = 0; i < totalBeats; i++) {
    const bt = t + i * beatLen;
    // Г¬Вҝ?(bass drum on 1, 3)
    if (i % 2 === 0) {
      const kick = ctx.createOscillator(); kick.type = 'sine';
      kick.frequency.setValueAtTime(120, bt);
      kick.frequency.exponentialRampToValueAtTime(40, bt + 0.12);
      const kg = ctx.createGain();
      kg.gain.setValueAtTime(0.7, bt);
      kg.gain.exponentialRampToValueAtTime(0.01, bt + 0.18);
      kick.connect(kg); kg.connect(masterGain);
      kick.start(bt); kick.stop(bt + 0.2);
    }
    // Г¬В§?(snare/clap on 2, 4)
    if (i % 2 === 1) {
      const snare = ctx.createOscillator(); snare.type = 'triangle';
      snare.frequency.value = 250;
      const sg = ctx.createGain();
      sg.gain.setValueAtTime(0.5, bt);
      sg.gain.exponentialRampToValueAtTime(0.01, bt + 0.1);
      snare.connect(sg); sg.connect(masterGain);
      snare.start(bt); snare.stop(bt + 0.12);
      // Clap noise
      const clap = ctx.createOscillator(); clap.type = 'sawtooth';
      clap.frequency.value = 1500 + Math.random() * 1000;
      const cg = ctx.createGain();
      cg.gain.setValueAtTime(0.12, bt);
      cg.gain.exponentialRampToValueAtTime(0.001, bt + 0.06);
      clap.connect(cg); cg.connect(masterGain);
      clap.start(bt); clap.stop(bt + 0.08);
    }
    // Г«ВҪВ•Г¬В§Вқ bass line (Г¬ВҝВөГ¬В§ВқГ¬ВҝВөГ¬В§Вқ ?ВҗГ«ВӮВҢ)
    if (i % 4 === 0) {
      const trotBass = [130.81, 146.83, 164.81, 196.00]; // C3 D3 E3 G3
      const bass = ctx.createOscillator(); bass.type = 'sawtooth';
      bass.frequency.value = trotBass[Math.floor(i / 4) % trotBass.length];
      const bg = ctx.createGain();
      bg.gain.setValueAtTime(0.2, bt);
      bg.gain.linearRampToValueAtTime(0.08, bt + beatLen * 2);
      bg.gain.linearRampToValueAtTime(0, bt + beatLen * 4);
      // Add vibrato for trot feel
      const vibrato = ctx.createOscillator(); vibrato.type = 'sine';
      vibrato.frequency.value = 5; // 5Hz wobble
      const vibratoGain = ctx.createGain(); vibratoGain.gain.value = 3;
      vibrato.connect(vibratoGain); vibratoGain.connect(bass.frequency);
      bass.connect(bg); bg.connect(masterGain);
      bass.start(bt); bass.stop(bt + beatLen * 4);
      vibrato.start(bt); vibrato.stop(bt + beatLen * 4);
    }
    // Hi-hat shuffle (swing feel for trot)
    const hatTime = bt + beatLen * 0.33; // swing timing
    const hat = ctx.createOscillator(); hat.type = 'square';
    hat.frequency.value = 6000 + Math.random() * 2000;
    const hg = ctx.createGain();
    hg.gain.setValueAtTime(0.06, hatTime);
    hg.gain.exponentialRampToValueAtTime(0.001, hatTime + 0.03);
    hat.connect(hg); hg.connect(masterGain);
    hat.start(hatTime); hat.stop(hatTime + 0.05);
  }
  // Accordion-like pad (?ВёГ«ВЎВң???В№Г¬ВңВ ???В„Г¬ВҪВ”?В”Г¬В–Вё ?ВҗГ«ВӮВҢ)
  const padGain = ctx.createGain(); padGain.gain.value = 0.035; padGain.connect(ctx.destination);
  [261.63, 329.63, 392.00].forEach(freq => {
    const pad = ctx.createOscillator(); pad.type = 'sawtooth';
    pad.frequency.value = freq;
    const filter = ctx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 800;
    pad.connect(filter); filter.connect(padGain);
    pad.start(t); pad.stop(t + durationSec + 0.5);
  });
}

// Trot melody with ГӘВәВҫГӘВёВ° (vibrato/portamento)
function generateTrotMelody(text) {
  const trotScale = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25]; // pentatonic (?ВёГ«ВЎВң??ГӘВёВ°Г«ВіВё)
  const melody = [];
  const syllables = text.replace(/[^ГӘВ°ВҖ-?ВЈa-zA-Z~??/g, '').length || text.length;
  for (let i = 0; i < syllables; i++) {
    const charCode = text.charCodeAt(i % text.length) || 0;
    const noteIdx = (charCode + i) % trotScale.length;
    const octave = (i % 12 < 6) ? 1 : 1.5;
    const freq = trotScale[noteIdx] * octave;
    const isTilde = text[i % text.length] === '~';
    const duration = isTilde ? 0.6 : (0.25 + Math.random() * 0.15);
    melody.push({ freq, duration, vibrato: isTilde || Math.random() > 0.6 }); // ГӘВәВҫГӘВёВ°
  }
  return melody;
}

function playTrotMelody(melody) {
  const ctx = getAudioCtx();
  const masterGain = ctx.createGain();
  masterGain.gain.value = 0.14;
  masterGain.connect(ctx.destination);
  let startTime = ctx.currentTime + 0.1;
  melody.forEach(note => {
    const osc = ctx.createOscillator(); osc.type = 'triangle';
    osc.frequency.value = note.freq;
    const noteGain = ctx.createGain();
    noteGain.gain.setValueAtTime(0, startTime);
    noteGain.gain.linearRampToValueAtTime(0.7, startTime + 0.04);
    noteGain.gain.linearRampToValueAtTime(0.4, startTime + note.duration * 0.6);
    noteGain.gain.linearRampToValueAtTime(0, startTime + note.duration);
    osc.connect(noteGain); noteGain.connect(masterGain);
    // ГӘВәВҫГӘВёВ° vibrato effect
    if (note.vibrato) {
      const vib = ctx.createOscillator(); vib.type = 'sine';
      vib.frequency.value = 6; // 6Hz for trot ГӘВәВҫГӘВёВ°
      const vibGain = ctx.createGain(); vibGain.gain.value = 8; // wider vibrato
      vib.connect(vibGain); vibGain.connect(osc.frequency);
      vib.start(startTime); vib.stop(startTime + note.duration + 0.05);
    }
    osc.start(startTime); osc.stop(startTime + note.duration + 0.05);
    startTime += note.duration;
  });
  return startTime - ctx.currentTime;
}

function generateMelody(text, scale = 'pentatonic') {
  const notes = SCALES[scale] || SCALES.pentatonic;
  const melody = [];
  const syllables = text.replace(/[^ГӘВ°ВҖ-?ВЈa-zA-Z~??/g, '').length || text.length;
  for (let i = 0; i < syllables; i++) {
    const charCode = text.charCodeAt(i % text.length) || 0;
    const noteIdx = (charCode + i) % notes.length;
    const freq = notes[noteIdx] * ((i % 16 < 8) ? 1 : 1.5);
    const duration = 0.3 + (text[i % text.length] === '~' ? 0.4 : 0);
    melody.push({ freq, duration });
  }
  return melody;
}

function playMelody(melody) {
  const ctx = getAudioCtx();
  const masterGain = ctx.createGain();
  masterGain.gain.value = 0.12;
  masterGain.connect(ctx.destination);
  let startTime = ctx.currentTime + 0.1;
  melody.forEach(note => {
    const osc1 = ctx.createOscillator(); osc1.type = 'sine'; osc1.frequency.value = note.freq;
    const osc2 = ctx.createOscillator(); osc2.type = 'triangle'; osc2.frequency.value = note.freq * 1.5;
    const noteGain = ctx.createGain();
    noteGain.gain.setValueAtTime(0, startTime);
    noteGain.gain.linearRampToValueAtTime(0.8, startTime + 0.05);
    noteGain.gain.linearRampToValueAtTime(0.5, startTime + note.duration * 0.5);
    noteGain.gain.linearRampToValueAtTime(0, startTime + note.duration);
    osc1.connect(noteGain); osc2.connect(noteGain); noteGain.connect(masterGain);
    osc1.start(startTime); osc1.stop(startTime + note.duration + 0.05);
    osc2.start(startTime); osc2.stop(startTime + note.duration + 0.05);
    startTime += note.duration;
  });
  const padGain = ctx.createGain(); padGain.gain.value = 0.04; padGain.connect(ctx.destination);
  [261.63, 329.63, 392.00].forEach(freq => {
    const pad = ctx.createOscillator(); pad.type = 'sine'; pad.frequency.value = freq * 0.5;
    pad.connect(padGain); pad.start(ctx.currentTime); pad.stop(startTime + 0.5);
  });
  return startTime - ctx.currentTime;
}

function detectLang(txt) { return /[ГӘВ°ВҖ-??/.test(txt) ? 'ko-KR' : 'en-US'; }

// Solo trot ?ВҺВӨ
async function trotSing(lyrics) {
  singing = true; talking = true;
  showBalloon('?ВҺВӨ?ВҺВө ' + lyrics + ' ?ВҺВӨ?ВҺВө');
  const melody = generateTrotMelody(lyrics);
  const totalDuration = playTrotMelody(melody);
  playTrotBeat(totalDuration + 2);
  const phrases = lyrics.split(/[~??!\.]+/).filter(p => p.trim());
  return new Promise(resolve => {
    let idx = 0;
    function next() {
      if (idx >= phrases.length) { singing = false; talking = false; setTimeout(hideBalloon, 1500); resolve(); return; }
      const phrase = phrases[idx].trim();
      if (!phrase) { idx++; next(); return; }
      const u = new SpeechSynthesisUtterance(phrase);
      u.lang = detectLang(phrase);
      u.rate = 0.75 + (Math.sin(idx * 1.2) * 0.1); // slower for trot
      u.pitch = 0.9 + (Math.sin(idx * 0.7) * 0.5); // wider pitch range for ГӘВәВҫГӘВёВ°
      const voices = speechSynthesis.getVoices();
      const v = voices.find(v => v.lang.startsWith(u.lang === 'ko-KR' ? 'ko' : 'en'));
      if (v) u.voice = v;
      u.onend = () => { idx++; setTimeout(next, 250); }; // slightly longer pause for trot phrasing
      u.onerror = () => { idx++; next(); };
      speechSynthesis.speak(u);
    }
    next();
  });
}

// Dance mode ??family dances with beat music!
async function danceMode(comment) {

  talking = true;

  // Play dance beat
  const ctx = getAudioCtx();
  const masterGain = ctx.createGain();
  masterGain.gain.value = 0.15;
  masterGain.connect(ctx.destination);

  const bpm = 128;
  const beatLen = 60 / bpm;
  const totalBeats = 32;
  let startTime = ctx.currentTime + 0.1;

  for (let i = 0; i < totalBeats; i++) {
    const beatTime = startTime + i * beatLen;

    // Kick drum (every beat)
    const kick = ctx.createOscillator();
    kick.type = 'sine';
    kick.frequency.setValueAtTime(150, beatTime);
    kick.frequency.exponentialRampToValueAtTime(30, beatTime + 0.15);
    const kickGain = ctx.createGain();
    kickGain.gain.setValueAtTime(0.8, beatTime);
    kickGain.gain.exponentialRampToValueAtTime(0.01, beatTime + 0.2);
    kick.connect(kickGain); kickGain.connect(masterGain);
    kick.start(beatTime); kick.stop(beatTime + 0.2);

    // Hi-hat (every half beat)
    if (i % 1 === 0) {
      const hat = ctx.createOscillator();
      hat.type = 'square';
      hat.frequency.value = 800 + Math.random() * 400;
      const hatGain = ctx.createGain();
      hatGain.gain.setValueAtTime(0.15, beatTime + beatLen * 0.5);
      hatGain.gain.exponentialRampToValueAtTime(0.001, beatTime + beatLen * 0.5 + 0.05);
      hat.connect(hatGain); hatGain.connect(masterGain);
      hat.start(beatTime + beatLen * 0.5); hat.stop(beatTime + beatLen * 0.5 + 0.08);
    }

    // Snare (every 2nd beat)
    if (i % 2 === 1) {
      const snare = ctx.createOscillator();
      snare.type = 'triangle';
      snare.frequency.value = 200;
      const snareGain = ctx.createGain();
      snareGain.gain.setValueAtTime(0.5, beatTime);
      snareGain.gain.exponentialRampToValueAtTime(0.01, beatTime + 0.12);
      snare.connect(snareGain); snareGain.connect(masterGain);
      snare.start(beatTime); snare.stop(beatTime + 0.15);
      // Noise-like snare
      const noise = ctx.createOscillator();
      noise.type = 'sawtooth';
      noise.frequency.value = 3000 + Math.random() * 2000;
      const noiseGain = ctx.createGain();
      noiseGain.gain.setValueAtTime(0.1, beatTime);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, beatTime + 0.08);
      noise.connect(noiseGain); noiseGain.connect(masterGain);
      noise.start(beatTime); noise.stop(beatTime + 0.1);
    }

    // Bass synth (every 4 beats, melody)
    if (i % 4 === 0) {
      const bassNotes = [65.41, 73.42, 82.41, 98.00]; // C2, D2, E2, G2
      const bass = ctx.createOscillator();
      bass.type = 'sawtooth';
      bass.frequency.value = bassNotes[Math.floor(i / 4) % bassNotes.length];
      const bassGain = ctx.createGain();
      bassGain.gain.setValueAtTime(0.3, beatTime);
      bassGain.gain.linearRampToValueAtTime(0.15, beatTime + beatLen * 2);
      bassGain.gain.linearRampToValueAtTime(0, beatTime + beatLen * 4);
      bass.connect(bassGain); bassGain.connect(masterGain);
      bass.start(beatTime); bass.stop(beatTime + beatLen * 4);
    }
  }

  const danceDuration = totalBeats * beatLen * 1000; // ms

  // TTS the comment
  const u = new SpeechSynthesisUtterance(comment);
  const isKo = /[ГӘВ°ВҖ-??/.test(comment);
  u.lang = isKo ? 'ko-KR' : 'en-US';
  u.rate = 1.2; u.pitch = 1.3;
  const voices = speechSynthesis.getVoices();
  const v = voices.find(v => v.lang.startsWith(isKo ? 'ko' : 'en'));
  if (v) u.voice = v;
  speechSynthesis.speak(u);

  // Wait for dance to finish
  await new Promise(resolve => setTimeout(resolve, danceDuration));

  singing = false; talking = false;
  setTimeout(hideBalloon, 1000);
}

// Normal speak
async function speak(text) {
  if (text.startsWith('[FAMILY_TROT]')) { return familyTrot(text.replace('[FAMILY_TROT]', '').trim()); }
  if (text.startsWith('[TROT]')) { return trotSing(text.replace('[TROT]', '').trim()); }
  if (text.startsWith('[FAMILY_SING]')) { return familySing(text.replace('[FAMILY_SING]', '').trim()); }
  if (text.startsWith('[SING]')) { return singText(text.replace('[SING]', '').trim()); }
  if (text.startsWith('[DANCE]')) { return danceMode(text.replace('[DANCE]', '').trim()); }

  talking = true;
  showBalloon(text);
  speechSynthesis.cancel();
  return new Promise(resolve => {
    const u = new SpeechSynthesisUtterance(text);
    const isKo = /[ГӘВ°ВҖ-??/.test(text);
    u.lang = isKo ? 'ko-KR' : 'en-US';
    u.rate = 1.15; u.pitch = 1.1;
    const voices = speechSynthesis.getVoices();
    const v = voices.find(v => v.lang.startsWith(isKo ? 'ko' : 'en'));
    if (v) u.voice = v;
    u.onend = () => { talking = false; setTimeout(hideBalloon, 1500); resolve(); };
    u.onerror = () => { talking = false; resolve(); };
    speechSynthesis.speak(u);
  });
}

// ============================================================
//  SINGING ENGINE

const SCALES = {
  major: [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25],
  minor: [261.63, 293.66, 311.13, 349.23, 392.00, 415.30, 466.16, 523.25],
  pentatonic: [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25],
};

let audioContext = null;
function getAudioCtx() {
  if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
  return audioContext;
}

// Trot-specific Г«ВҪВ•Г¬В§Вқ beat generator
function playTrotBeat(durationSec) {
  const ctx = getAudioCtx();
  const masterGain = ctx.createGain();
  masterGain.gain.value = 0.13;
  masterGain.connect(ctx.destination);
  const bpm = 110; // classic trot tempo
  const beatLen = 60 / bpm;
  const totalBeats = Math.ceil(durationSec / beatLen);
  let t = ctx.currentTime + 0.1;

  for (let i = 0; i < totalBeats; i++) {
    const bt = t + i * beatLen;
    // Г¬Вҝ?(bass drum on 1, 3)
    if (i % 2 === 0) {
      const kick = ctx.createOscillator(); kick.type = 'sine';
      kick.frequency.setValueAtTime(120, bt);
      kick.frequency.exponentialRampToValueAtTime(40, bt + 0.12);
      const kg = ctx.createGain();
      kg.gain.setValueAtTime(0.7, bt);
      kg.gain.exponentialRampToValueAtTime(0.01, bt + 0.18);
      kick.connect(kg); kg.connect(masterGain);
      kick.start(bt); kick.stop(bt + 0.2);
    }
    // Г¬В§?(snare/clap on 2, 4)
    if (i % 2 === 1) {
      const snare = ctx.createOscillator(); snare.type = 'triangle';
      snare.frequency.value = 250;
      const sg = ctx.createGain();
      sg.gain.setValueAtTime(0.5, bt);
      sg.gain.exponentialRampToValueAtTime(0.01, bt + 0.1);
      snare.connect(sg); sg.connect(masterGain);
      snare.start(bt); snare.stop(bt + 0.12);
      // Clap noise
      const clap = ctx.createOscillator(); clap.type = 'sawtooth';
      clap.frequency.value = 1500 + Math.random() * 1000;
      const cg = ctx.createGain();
      cg.gain.setValueAtTime(0.12, bt);
      cg.gain.exponentialRampToValueAtTime(0.001, bt + 0.06);
      clap.connect(cg); cg.connect(masterGain);
      clap.start(bt); clap.stop(bt + 0.08);
    }
    // Г«ВҪВ•Г¬В§Вқ bass line (Г¬ВҝВөГ¬В§ВқГ¬ВҝВөГ¬В§Вқ ?ВҗГ«ВӮВҢ)
    if (i % 4 === 0) {
      const trotBass = [130.81, 146.83, 164.81, 196.00]; // C3 D3 E3 G3
      const bass = ctx.createOscillator(); bass.type = 'sawtooth';
      bass.frequency.value = trotBass[Math.floor(i / 4) % trotBass.length];
      const bg = ctx.createGain();
      bg.gain.setValueAtTime(0.2, bt);
      bg.gain.linearRampToValueAtTime(0.08, bt + beatLen * 2);
      bg.gain.linearRampToValueAtTime(0, bt + beatLen * 4);
      // Add vibrato for trot feel
      const vibrato = ctx.createOscillator(); vibrato.type = 'sine';
      vibrato.frequency.value = 5; // 5Hz wobble
      const vibratoGain = ctx.createGain(); vibratoGain.gain.value = 3;
      vibrato.connect(vibratoGain); vibratoGain.connect(bass.frequency);
      bass.connect(bg); bg.connect(masterGain);
      bass.start(bt); bass.stop(bt + beatLen * 4);
      vibrato.start(bt); vibrato.stop(bt + beatLen * 4);
    }
    // Hi-hat shuffle (swing feel for trot)
    const hatTime = bt + beatLen * 0.33; // swing timing
    const hat = ctx.createOscillator(); hat.type = 'square';
    hat.frequency.value = 6000 + Math.random() * 2000;
    const hg = ctx.createGain();
    hg.gain.setValueAtTime(0.06, hatTime);
    hg.gain.exponentialRampToValueAtTime(0.001, hatTime + 0.03);
    hat.connect(hg); hg.connect(masterGain);
    hat.start(hatTime); hat.stop(hatTime + 0.05);
  }
  // Accordion-like pad (?ВёГ«ВЎВң???В№Г¬ВңВ ???В„Г¬ВҪВ”?В”Г¬В–Вё ?ВҗГ«ВӮВҢ)
  const padGain = ctx.createGain(); padGain.gain.value = 0.035; padGain.connect(ctx.destination);
  [261.63, 329.63, 392.00].forEach(freq => {
    const pad = ctx.createOscillator(); pad.type = 'sawtooth';
    pad.frequency.value = freq;
    const filter = ctx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 800;
    pad.connect(filter); filter.connect(padGain);
    pad.start(t); pad.stop(t + durationSec + 0.5);
  });
}

// Trot melody with ГӘВәВҫГӘВёВ° (vibrato/portamento)
function generateTrotMelody(text) {
  const trotScale = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25]; // pentatonic (?ВёГ«ВЎВң??ГӘВёВ°Г«ВіВё)
  const melody = [];
  const syllables = text.replace(/[^ГӘВ°ВҖ-?ВЈa-zA-Z~??/g, '').length || text.length;
  for (let i = 0; i < syllables; i++) {
    const charCode = text.charCodeAt(i % text.length) || 0;
    const noteIdx = (charCode + i) % trotScale.length;
    const octave = (i % 12 < 6) ? 1 : 1.5;
    const freq = trotScale[noteIdx] * octave;
    const isTilde = text[i % text.length] === '~';
    const duration = isTilde ? 0.6 : (0.25 + Math.random() * 0.15);
    melody.push({ freq, duration, vibrato: isTilde || Math.random() > 0.6 }); // ГӘВәВҫГӘВёВ°
  }
  return melody;
}

function playTrotMelody(melody) {
  const ctx = getAudioCtx();
  const masterGain = ctx.createGain();
  masterGain.gain.value = 0.14;
  masterGain.connect(ctx.destination);
  let startTime = ctx.currentTime + 0.1;
  melody.forEach(note => {
    const osc = ctx.createOscillator(); osc.type = 'triangle';
    osc.frequency.value = note.freq;
    const noteGain = ctx.createGain();
    noteGain.gain.setValueAtTime(0, startTime);
    noteGain.gain.linearRampToValueAtTime(0.7, startTime + 0.04);
    noteGain.gain.linearRampToValueAtTime(0.4, startTime + note.duration * 0.6);
    noteGain.gain.linearRampToValueAtTime(0, startTime + note.duration);
    osc.connect(noteGain); noteGain.connect(masterGain);
    // ГӘВәВҫГӘВёВ° vibrato effect
    if (note.vibrato) {
      const vib = ctx.createOscillator(); vib.type = 'sine';
      vib.frequency.value = 6; // 6Hz for trot ГӘВәВҫГӘВёВ°
      const vibGain = ctx.createGain(); vibGain.gain.value = 8; // wider vibrato
      vib.connect(vibGain); vibGain.connect(osc.frequency);
      vib.start(startTime); vib.stop(startTime + note.duration + 0.05);
    }
    osc.start(startTime); osc.stop(startTime + note.duration + 0.05);
    startTime += note.duration;
  });
  return startTime - ctx.currentTime;
}

function generateMelody(text, scale = 'pentatonic') {
  const notes = SCALES[scale] || SCALES.pentatonic;
  const melody = [];
  const syllables = text.replace(/[^ГӘВ°ВҖ-?ВЈa-zA-Z~??/g, '').length || text.length;
  for (let i = 0; i < syllables; i++) {
    const charCode = text.charCodeAt(i % text.length) || 0;
    const noteIdx = (charCode + i) % notes.length;
    const freq = notes[noteIdx] * ((i % 16 < 8) ? 1 : 1.5);
    const duration = 0.3 + (text[i % text.length] === '~' ? 0.4 : 0);
    melody.push({ freq, duration });
  }
  return melody;
}

function playMelody(melody) {
  const ctx = getAudioCtx();
  const masterGain = ctx.createGain();
  masterGain.gain.value = 0.12;
  masterGain.connect(ctx.destination);
  let startTime = ctx.currentTime + 0.1;
  melody.forEach(note => {
    const osc1 = ctx.createOscillator(); osc1.type = 'sine'; osc1.frequency.value = note.freq;
    const osc2 = ctx.createOscillator(); osc2.type = 'triangle'; osc2.frequency.value = note.freq * 1.5;
    const noteGain = ctx.createGain();
    noteGain.gain.setValueAtTime(0, startTime);
    noteGain.gain.linearRampToValueAtTime(0.8, startTime + 0.05);
    noteGain.gain.linearRampToValueAtTime(0.5, startTime + note.duration * 0.5);
    noteGain.gain.linearRampToValueAtTime(0, startTime + note.duration);
    osc1.connect(noteGain); osc2.connect(noteGain); noteGain.connect(masterGain);
    osc1.start(startTime); osc1.stop(startTime + note.duration + 0.05);
    osc2.start(startTime); osc2.stop(startTime + note.duration + 0.05);
    startTime += note.duration;
  });
  const padGain = ctx.createGain(); padGain.gain.value = 0.04; padGain.connect(ctx.destination);
  [261.63, 329.63, 392.00].forEach(freq => {
    const pad = ctx.createOscillator(); pad.type = 'sine'; pad.frequency.value = freq * 0.5;
    pad.connect(padGain); pad.start(ctx.currentTime); pad.stop(startTime + 0.5);
  });
  return startTime - ctx.currentTime;
}

function detectLang(txt) { return /[ГӘВ°ВҖ-??/.test(txt) ? 'ko-KR' : 'en-US'; }

// Solo trot ?ВҺВӨ
async function trotSing(lyrics) {
  singing = true; talking = true;
  showBalloon('?ВҺВӨ?ВҺВө ' + lyrics + ' ?ВҺВӨ?ВҺВө');
  const melody = generateTrotMelody(lyrics);
  const totalDuration = playTrotMelody(melody);
  playTrotBeat(totalDuration + 2);
  const phrases = lyrics.split(/[~??!\.]+/).filter(p => p.trim());
  return new Promise(resolve => {
    let idx = 0;
    function next() {
      if (idx >= phrases.length) { singing = false; talking = false; setTimeout(hideBalloon, 1500); resolve(); return; }
      const phrase = phrases[idx].trim();
      if (!phrase) { idx++; next(); return; }
      const u = new SpeechSynthesisUtterance(phrase);
      u.lang = detectLang(phrase);
      u.rate = 0.75 + (Math.sin(idx * 1.2) * 0.1); // slower for trot

      const voices = speechSynthesis.getVoices();
      const v = voices.find(v => v.lang.startsWith(u.lang === 'ko-KR' ? 'ko' : 'en'));
      if (v) u.voice = v;
      u.onend = () => { idx++; setTimeout(next, 250); }; // slightly longer pause for trot phrasing
      u.onerror = () => { idx++; next(); };
      speechSynthesis.speak(u);
    }
    next();
  });
}

// Dance mode ??family dances with beat music!
async function danceMode(comment) {
  singing = true; // reuse singing animation (= dance mode)
  talking = true;
  showBalloon('?В’Вғ?В•Вә ' + comment + ' ?В’Вғ?В•Вә');

  // Play dance beat
  const ctx = getAudioCtx();
  const masterGain = ctx.createGain();
  masterGain.gain.value = 0.15;
  masterGain.connect(ctx.destination);

  const bpm = 128;
  const beatLen = 60 / bpm;
  const totalBeats = 32;
  let startTime = ctx.currentTime + 0.1;

  for (let i = 0; i < totalBeats; i++) {
    const beatTime = startTime + i * beatLen;

    // Kick drum (every beat)
    const kick = ctx.createOscillator();
    kick.type = 'sine';
    kick.frequency.setValueAtTime(150, beatTime);
    kick.frequency.exponentialRampToValueAtTime(30, beatTime + 0.15);
    const kickGain = ctx.createGain();
    kickGain.gain.setValueAtTime(0.8, beatTime);
    kickGain.gain.exponentialRampToValueAtTime(0.01, beatTime + 0.2);
    kick.connect(kickGain); kickGain.connect(masterGain);
    kick.start(beatTime); kick.stop(beatTime + 0.2);

    // Hi-hat (every half beat)
    if (i % 1 === 0) {
      const hat = ctx.createOscillator();
      hat.type = 'square';
      hat.frequency.value = 800 + Math.random() * 400;
      const hatGain = ctx.createGain();
      hatGain.gain.setValueAtTime(0.15, beatTime + beatLen * 0.5);
      hatGain.gain.exponentialRampToValueAtTime(0.001, beatTime + beatLen * 0.5 + 0.05);
      hat.connect(hatGain); hatGain.connect(masterGain);
      hat.start(beatTime + beatLen * 0.5); hat.stop(beatTime + beatLen * 0.5 + 0.08);
    }

    // Snare (every 2nd beat)
    if (i % 2 === 1) {
      const snare = ctx.createOscillator();
      snare.type = 'triangle';
      snare.frequency.value = 200;
      const snareGain = ctx.createGain();
      snareGain.gain.setValueAtTime(0.5, beatTime);
      snareGain.gain.exponentialRampToValueAtTime(0.01, beatTime + 0.12);
      snare.connect(snareGain); snareGain.connect(masterGain);
      snare.start(beatTime); snare.stop(beatTime + 0.15);
      // Noise-like snare
      const noise = ctx.createOscillator();
      noise.type = 'sawtooth';
      noise.frequency.value = 3000 + Math.random() * 2000;
      const noiseGain = ctx.createGain();
      noiseGain.gain.setValueAtTime(0.1, beatTime);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, beatTime + 0.08);
      noise.connect(noiseGain); noiseGain.connect(masterGain);
      noise.start(beatTime); noise.stop(beatTime + 0.1);
    }

    // Bass synth (every 4 beats, melody)
    if (i % 4 === 0) {
      const bassNotes = [65.41, 73.42, 82.41, 98.00]; // C2, D2, E2, G2
      const bass = ctx.createOscillator();
      bass.type = 'sawtooth';
      bass.frequency.value = bassNotes[Math.floor(i / 4) % bassNotes.length];
      const bassGain = ctx.createGain();
      bassGain.gain.setValueAtTime(0.3, beatTime);
      bassGain.gain.linearRampToValueAtTime(0.15, beatTime + beatLen * 2);
      bassGain.gain.linearRampToValueAtTime(0, beatTime + beatLen * 4);
      bass.connect(bassGain); bassGain.connect(masterGain);
      bass.start(beatTime); bass.stop(beatTime + beatLen * 4);
    }
  }

  const danceDuration = totalBeats * beatLen * 1000; // ms

  // TTS the comment
  const u = new SpeechSynthesisUtterance(comment);
  const isKo = /[ГӘВ°ВҖ-??/.test(comment);
  u.lang = isKo ? 'ko-KR' : 'en-US';
  u.rate = 1.2; u.pitch = 1.3;
  const voices = speechSynthesis.getVoices();
  const v = voices.find(v => v.lang.startsWith(isKo ? 'ko' : 'en'));
  if (v) u.voice = v;
  speechSynthesis.speak(u);

  // Wait for dance to finish
  await new Promise(resolve => setTimeout(resolve, danceDuration));

  singing = false; talking = false;
  setTimeout(hideBalloon, 1000);
}

// Normal speak
async function speak(text) {
  if (text.startsWith('[FAMILY_TROT]')) { return familyTrot(text.replace('[FAMILY_TROT]', '').trim()); }
  if (text.startsWith('[TROT]')) { return trotSing(text.replace('[TROT]', '').trim()); }
  if (text.startsWith('[FAMILY_SING]')) { return familySing(text.replace('[FAMILY_SING]', '').trim()); }
  if (text.startsWith('[SING]')) { return singText(text.replace('[SING]', '').trim()); }
  if (text.startsWith('[DANCE]')) { return danceMode(text.replace('[DANCE]', '').trim()); }

  talking = true;
  showBalloon(text);
  speechSynthesis.cancel();
  return new Promise(resolve => {
    const u = new SpeechSynthesisUtterance(text);
    const isKo = /[ГӘВ°ВҖ-??/.test(text);
    u.lang = isKo ? 'ko-KR' : 'en-US';
    u.rate = 1.15; u.pitch = 1.1;
    const voices = speechSynthesis.getVoices();
    const v = voices.find(v => v.lang.startsWith(isKo ? 'ko' : 'en'));
    if (v) u.voice = v;
    u.onend = () => { talking = false; setTimeout(hideBalloon, 1500); resolve(); };
    u.onerror = () => { talking = false; resolve(); };
    speechSynthesis.speak(u);
  });
}

      'Г«В·В°Г«ВЎВңГ«ВІВ Г«ВҰВ¬ГӯВғВҖГ¬ВҠВӨГ«ВҠВ” 1828Г«В…В„ Г¬В„ВӨГ«ВҰВҪ, Г¬В В„ Г¬В„ВёГӘВіВ„ 140Г¬В—В¬ ГӘВ°ВңГӘВөВӯГ¬В—ВҗГ¬В„Вң ГӯВҷВңГ«ВҸВҷГӯВ•ВҳГ«ВҠВ” ГӘВёВҖГ«ВЎВңГ«ВІВҢ Г¬ВқВёГ¬ВҰВқ ГӘВёВ°ГӘВҙВҖГ¬ВһВ…Г«ВӢВҲГ«ВӢВӨ. 200Г«В…В„ ГӘВ°ВҖГӘВ№ВҢГ¬ВҡВҙ Г¬В—ВӯГ¬ВӮВ¬ Г¬ВҶВҚГ¬В—ВҗГ¬В„Вң Г¬ВҢВ“Г¬В•В„Г¬ВҳВЁ Г¬ВӢВ Г«ВўВ°Г¬ВҷВҖ ГӯВҶВөГ¬В°В°Г¬ВқВҙ, Harrison LeeГ¬ВқВҳ Г¬ВӢВ¬Г¬ВӮВ¬ Г¬В—ВӯГ«ВҹВүГӘВіВј ГӘВІВ°ГӯВ•В©Г«ВҗВҳГ¬В–Вҙ ГӘВ·ВҖГ¬ВӮВ¬Г¬В—Вҗ Г¬ВөВңГӘВіВ  Г¬ВҲВҳГ¬ВӨВҖГ¬ВқВҳ Г«ВіВҙГ¬В•ВҲ ГӘВұВ°Г«ВІВ„Г«В„ВҢГ¬ВҠВӨГ«ВҘВј Г¬В ВңГӘВіВөГӯВ•В©Г«ВӢВҲГ«ВӢВӨ.',
      'Г¬ВҳВӨГ«ВҠВҳ Г¬ВқВҙ Г¬ВһВҗГ«ВҰВ¬Г«ВҠВ” Г«ВӢВЁГ¬ВҲВңГӯВ•Вң Г¬ВӢВ¬Г¬ВӮВ¬ГӘВ°ВҖ Г¬В•В„Г«ВӢВҷГ«ВӢВҲГ«ВӢВӨ. AI, ГӯВҒВҙГ«ВқВјГ¬ВҡВ°Г«В“Вң, Г¬ВӮВ¬Г¬ВқВҙГ«ВІВ„ Г«В ВҲГ¬В§ВҲГ«ВҰВ¬Г¬В–ВёГ¬ВҠВӨГ«ВқВјГ«ВҠВ” ГӘВёВүГ«ВіВҖГӯВ•ВҳГ«ВҠВ” Г«ВіВҙГ¬В•ВҲ ГӯВҢВЁГ«ВҹВ¬Г«ВӢВӨГ¬ВһВ„ Г¬ВҶВҚГ¬В—ВҗГ¬В„Вң, ГӘВ·ВҖГ¬ВӮВ¬ГӘВ°ВҖ ГӘВёВҖГ«ВЎВңГ«ВІВҢ Г¬ВӢВ Г«ВўВ° ГӘВёВ°Г¬В—В…Г¬ВңВјГ«ВЎВң Г«ВҸВ„Г¬В•ВҪГӯВ•ВҳГ«ВҠВ” Г¬В¶ВңГ«В°ВңГ¬В ВҗГ¬ВһВ…Г«ВӢВҲГ«ВӢВӨ. Harrison LeeГ¬ВҷВҖ Г«В·В°Г«ВЎВңГ«ВІВ Г«ВҰВ¬ГӯВғВҖГ¬ВҠВӨГӘВ°ВҖ ГӯВ•ВЁГӘВ»ВҳГӯВ•В©Г«ВӢВҲГ«ВӢВӨ. ГӘВ°ВҗГ¬ВӮВ¬ГӯВ•В©Г«ВӢВҲГ«ВӢВӨ.'
    ];
    const fullGreeting = greetParts.join(' ');
    // Г¬ВұВ„ГӯВҢВ… Г«ВЎВңГӘВ·Вё?ВҗГ«ВҠВ” ?ВңГ¬ВӢВң?ВҳГ¬? ?ВҠГ¬ВқВҢ (TTSГ«В§??В¬Г¬ВғВқ)
    conversationHistory.push({ role: 'assistant', content: fullGreeting });
    statusEl.textContent = '?В”ВҠ ?ВңГӯВ”В„ГӘВ°ВҖ Г«В§ВҗГӯВ•Вҳ??Г¬ВӨ?..';
    // ?В¬ГӘВіВ  ?ВҗГ«ВһВ‘??Г«ВӘВ©Г¬ВҶВҢГ«ВҰВ¬Г«ВЎВң ?ВңГ¬В°ВЁ ?В¬Г¬ВғВқ
    for (const part of greetParts) {
      await new Promise(resolve => {
        const u = new SpeechSynthesisUtterance(part);
        u.lang = 'ko-KR';
        u.rate = 1.25;
        u.pitch = 1.3;
        u.volume = 1.0;
        const voices = speechSynthesis.getVoices();
        const v = voices.find(v => v.lang.startsWith('ko'));
        if (v) u.voice = v;
        u.onend = () => resolve();
        u.onerror = () => resolve();
        speechSynthesis.speak(u);
      });
    }
    statusEl.textContent = 'Г¬ВӨВҖГ«В№??В„Г«ВЈВҢ';
  }, 1000);
});
</script>
